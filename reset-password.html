<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — OroFlow</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"><link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"><link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{-webkit-font-smoothing:antialiased}body{font-family:'Outfit',sans-serif;background:#f5f5f0;background-image:radial-gradient(circle,#d5d5cf 1px,transparent 1px);background-size:28px 28px;background-attachment:fixed;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-.03em}
.login-container{width:100%;max-width:420px;animation:fadeIn .5s cubic-bezier(.4,0,.2,1)}
.card{background:#ffffff;border:1px solid #e0e0da;border-radius:20px;padding:44px 36px;box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.06)}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;text-decoration:none}
.brand-logo{width:38px;height:38px;background:#1a1a1a;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:13px;color:#E2FF00}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-.04em}
h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-group input{width:100%;padding:12px 16px;background:#f5f5f0;border:1px solid #e0e0da;border-radius:11px;font-family:'Outfit',sans-serif;font-size:14px;color:#1a1a1a;outline:none;transition:all .25s cubic-bezier(.4,0,.2,1)}
.form-group input:focus{border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(226,255,0,.10)}
.pw-wrapper{position:relative}.pw-wrapper input{width:100%;padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:4px;line-height:1;transition:color .2s}.pw-toggle:hover{color:#1a1a1a}
.btn-submit{width:100%;padding:13px;background:#1a1a1a;color:#E2FF00;border:none;border-radius:11px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);margin-top:6px}
.btn-submit:hover{background:#111;box-shadow:0 4px 20px rgba(0,0,0,.15);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.msg{padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;text-align:center;display:none}
.msg-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}
.msg-err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.card{padding:32px 22px;border-radius:16px}}
</style>
</head>
<body>
<div class="login-container">
<div class="card">
<a href="/" class="brand"><div class="brand-logo">O+</div><span class="brand-name">OroFlow</span></a>

<div id="resetForm">
<h1>Set new password</h1>
<p class="subtitle">Enter your new password below.</p>
<div class="msg" id="msg"></div>
<div class="form-group"><label>New password</label><div class="pw-wrapper"><input type="password" id="newPass" placeholder="Min 8 characters"><button type="button" class="pw-toggle" onclick="togglePw(this)">&#128065;</button></div></div>
<div class="form-group"><label>Confirm password</label><div class="pw-wrapper"><input type="password" id="confPass" placeholder="Confirm password"><button type="button" class="pw-toggle" onclick="togglePw(this)">&#128065;</button></div></div>
<button class="btn-submit" id="submitBtn" onclick="updatePassword()">Update Password</button>
</div>

<div id="successMsg" style="display:none;text-align:center">
<div style="font-size:48px;margin-bottom:16px">✅</div>
<h1>Password updated!</h1>
<p class="subtitle">Your password has been changed. You can now sign in.</p>
<a href="/login.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:16px">Go to Login</a>
</div>

<div id="errorMsg" style="display:none;text-align:center">
<div style="font-size:48px;margin-bottom:16px">⚠️</div>
<h1>Invalid or expired link</h1>
<p class="subtitle">This reset link is no longer valid. Please request a new one.</p>
<a href="/forgot.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:16px">Request New Link</a>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://xsqfdhymfgrobzovfgjf.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_lm-yWNpuWJkyk3OwMWN5qw_TsEQY6xA';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function togglePw(btn) {
    var input = btn.previousElementSibling;
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '&#128064;';
    } else {
        input.type = 'password';
        btn.innerHTML = '&#128065;';
    }
}

function showMsg(text, type) {
    var m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg msg-' + type;
}

// Check if we have a valid session from the reset link
async function init() {
    // Supabase handles the token exchange from the URL hash automatically
    var { data, error } = await sb.auth.getSession();

    if (error || !data.session) {
        // Check if there's a hash with tokens (Supabase redirect)
        if (window.location.hash && window.location.hash.includes('access_token')) {
            // Wait a moment for Supabase to process the hash
            setTimeout(async function() {
                var retry = await sb.auth.getSession();
                if (!retry.data.session) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('errorMsg').style.display = 'block';
                }
            }, 1000);
        } else {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
}

async function updatePassword() {
    var np = document.getElementById('newPass').value;
    var conf = document.getElementById('confPass').value;

    if (!np) { showMsg('Please enter a new password', 'err'); return; }
    if (np.length < 8) { showMsg('Password must be at least 8 characters', 'err'); return; }
    if (np !== conf) { showMsg('Passwords do not match', 'err'); return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    var result = await sb.auth.updateUser({ password: np });

    if (result.error) {
        showMsg(result.error.message || 'Failed to update password', 'err');
        btn.disabled = false;
        btn.textContent = 'Update Password';
        return;
    }

    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
}

init();
</script>
</body>
</html>
